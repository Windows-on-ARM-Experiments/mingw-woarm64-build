name: Build Cygwin toolchain

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      binutils_branch:
        description: 'Binutils branch to build'
        required: false
        default: 'woarm64'
      gcc_branch:
        description: 'GCC branch to build'
        required: false
        default: 'woarm64'
      mingw_branch:
        description: 'Mingw branch to build'
        required: false
        default: 'woarm64'
      cygwin_branch:
        description: 'Cygwin branch to build'
        required: false
        default: 'native-cygwin'

env:
  BINUTILS_BRANCH: ${{ inputs.binutils_branch || 'woarm64' }}
  GCC_BRANCH: ${{ inputs.gcc_branch || 'woarm64' }}
  MINGW_BRANCH: ${{ inputs.mingw_branch || 'woarm64' }}
  CYGWIN_BRANCH: ${{ inputs.cygwin_branch || 'native-cygwin' }}

  ARCH: aarch64
  PLATFORM: pc-cygwin

  BUILD_PATH: /home/runneradmin/build
  CCACHE_DIR_PATH: /home/runneradmin/ccache
  TOOLCHAIN_PATH: /home/runneradmin/cross

  CCACHE: 0
  DELETE_BUILD: 1

jobs:
  build-toolchain:
    runs-on: [Windows, GCC]
    timeout-minutes: 1440

    defaults:
      run:
        shell: bash -c "$(s=$(/usr/bin/cygpath '{0}') && /usr/bin/sed -i 's/\r$//' $s && echo $s)"

    steps:
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@master
        with:
          platform: x86_64
          packages: >-
            autoconf,
            automake,
            busybox,
            cocom,
            cygutils-extra,
            dblatex,
            dejagnu,
            docbook-xml45,
            docbook-xsl,
            docbook2X,
            gcc-g++,
            gettext-devel,
            git,
            libiconv,
            libiconv-devel,
            libzstd-devel,
            make,
            mingw64-x86_64-gcc-g++,
            mingw64-x86_64-zlib,
            patch,
            perl,
            python39-lxml,
            python39-ply,
            texlive-collection-fontsrecommended,
            texlive-collection-latexrecommended,
            texlive-collection-pictures,
            wget,
            xmlto,
            zlib-devel

      - name: Setup Git
        run: |
          git config --global core.autocrlf input

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: false

      - name: Get cache key
        id: get-cache-key
        run: |
          echo "timestamp=$(date -u --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - name: Restore Ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR_PATH }}
          key: cygwin-gcc-ccache-${{ steps.get-cache-key.outputs.timestamp }}
          restore-keys: cygwin-gcc-ccache-

      - name: Run Build
        timeout-minutes: 1440
        run: |
          ./build.sh

      - name: Save Ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR_PATH }}
          key: cygwin-gcc-ccache-${{ steps.get-cache-key.outputs.timestamp }}

      - name: Upload build folder
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-pc-cygwin-build
          retention-days: 1
          path: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-pc-cygwin-toolchain
          path: ${{ env.TOOLCHAIN_PATH }}
          retention-days: 1

      - name: Create tag
        run: |
          echo "TAG=$(date --rfc-3339=date)" >> ${GITHUB_ENV}

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TOOLCHAIN_PATH }}/*
          tag_name: ${{ env.TAG }}
